<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0b1524" />
  <title>Cable Check — which USB-C cable do you need?</title>
  <meta
    name="description"
    content="A 10-second quiz that tells you exactly which USB-C cable in your drawer to use."
  />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#question-card">Skip to the questions</a>

  <button
    id="mute-toggle"
    class="mute-toggle"
    type="button"
    aria-label="Mute sound"
    aria-pressed="false"
  >🔊</button>

  <main id="app" class="app">
    <section class="stage">
      <div id="diagram" class="diagram-panel" aria-hidden="false"></div>

      <div class="card-panel">
        <header class="brand">
          <h1 class="wordmark">Cable<span class="wordmark-accent">Check</span></h1>
          <p class="tagline">
            Three taps to the one marking to look for on the cable in your drawer.
          </p>
        </header>

        <div id="question-card" class="question-card"></div>
      </div>
    </section>
  </main>

  <p id="live-status" class="sr-only" role="status" aria-live="polite"></p>

  <script type="module" src="app.js"></script>
</body>
</html>
